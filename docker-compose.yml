version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neowatch_db
    environment:
      POSTGRES_DB: neowatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neowatch_secret}
    ports:
      - "5432:5432"
    volumes:
      - neowatch_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: neowatch_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-neowatch_secret}@postgres:5432/neowatch
      PORT: 3001
      NODE_ENV: production
      NASA_API_KEY: ${NASA_API_KEY}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      ALERT_THRESHOLD: 65
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: neowatch_ui
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neowatch_data:
